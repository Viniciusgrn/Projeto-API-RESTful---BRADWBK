# ============================================================
#  CR9 — NGINX como balanceador de carga (round-robin)
# ============================================================
# Distribui as requisições /api entre as duas instâncias do backend
# (8086 = backend, 8087 = backend2). O frontend (SPA) continua na 3002.
#
# Onde colocar na VPS: este é o conteúdo de referência do server block de
# bookforum.vgrn.cloud. Integre o bloco `upstream` + o `proxy_pass` no arquivo
# do host (ex.: /etc/nginx/sites-available/bookforum.vgrn.cloud). As linhas de
# SSL (listen 443 ... managed by Certbot) já existentes devem ser mantidas.

# --- Pool de backends para balanceamento ---
upstream bookforum_backend {
    # Algoritmo padrão: round-robin (alterna entre as instâncias).
    server 127.0.0.1:8086;   # instância 1 (backend)
    server 127.0.0.1:8087;   # instância 2 (backend2)

    # Para o teste SEM balanceamento (CR10), comente a linha do 8087
    # e recarregue o nginx (deixa só a instância 1 recebendo carga).

    keepalive 32;
}

server {
    listen 80;
    server_name bookforum.vgrn.cloud;
    # (Em produção, o Certbot adiciona o redirecionamento para 443.)

    # API REST -> balanceada entre as instâncias do backend
    location /api/ {
        proxy_pass http://bookforum_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # mostra qual instância respondeu (útil para evidenciar o balanceamento)
        add_header X-Upstream $upstream_addr always;
    }

    # WebSocket (chat) — encaminhado para o pool também
    location /ws/ {
        proxy_pass http://bookforum_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
    }

    # Frontend (SPA Vue)
    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
